name: Workflow Lint

on:
  push:
    branches: [master, staging, stable]
    paths:
      - ".github/workflows/**"
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
    paths:
      - ".github/workflows/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: workflow-lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  actionlint:
    name: Actionlint
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run actionlint
        run: docker run --rm -v "${{ github.workspace }}:/repo" -w /repo rhysd/actionlint:latest
