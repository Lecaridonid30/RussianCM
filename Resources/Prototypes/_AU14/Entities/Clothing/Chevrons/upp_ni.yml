- type: entity
  parent: RMCArmbandBase
  id: AU14ChevronUPPNIBase
  abstract: true
  suffix: Naval Infantry Chevron
  description: Union of Progressive Peoples Naval Infantry chevron. Wearing this makes you feel proud, knowing you get extra rations compared to the proles.

