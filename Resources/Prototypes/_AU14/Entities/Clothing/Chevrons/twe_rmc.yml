# base
- type: entity
  parent: RMCArmbandBase
  id: AU14ChevronRMCBase
  abstract: true
  suffix: RMC Chevron
  description: Royal Marines rank insignia. The badge of a Marine who could operate in any extreme environment, too bad you'll spend most of your career on ships.

