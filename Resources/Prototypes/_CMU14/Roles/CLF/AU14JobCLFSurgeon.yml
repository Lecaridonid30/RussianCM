    skills:
      RMCSkillFireman: 1
      RMCSkillVehicles: 1
      RMCSkillDomestics: 1
      RMCSkillMedical: 3
      RMCSkillResearch: 1
      RMCSkillSurgery: 3
      RMCSkillFirearms: 2
      RMCSkillPolice: 1
  - type: JobPrefix
