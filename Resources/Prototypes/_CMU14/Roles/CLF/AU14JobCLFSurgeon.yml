    role: AU14JobCLFGuerilla
    time: 18000 # 5 hours
  - !type:DepartmentTimeRequirement
    department: AU14DepartmentColonyMedical
    time: 18000 # 5 hours
  - !type:TraitsRequirement
    inverted: true
    traits:
    - NonResuscitable
    - Epilepsy
  ranks:
    RMCRankCivilianDoctor: []
  startingGear: AU14GearCLFSurgeon
