- type: roundGroup
  id: DistressSignalXenoRoundGroup
  kind: Hostile
  sourcePrototypeId: XenoThreat
  spawn:
    bodyBuckets:
      - bucket: Leader
        count: 1
        bodies:
          CMXenoQueen: 1
      - bucket: Member
        count: 12
        bodies:
          CMXenoLarva: 5
        scaling:
          CMXenoLarva:
            scale: 0.11
            whenToBeginScaling: 30
      - bucket: Entity
        count: 0
    markerRequirements:
      - bucket: Leader
        requiredBodyCount: 1
        requiredMarkerCount: 1
        requiredTags:
          - force:hostile
          - bucket:Leader
          - marker-id:<generic>
      - bucket: Member
        requiredBodyCount: 12
        requiredMarkerCount: 1
        requiredTags:
          - force:hostile
          - bucket:Member
          - marker-id:<generic>
    allowsUnderfill: true
  winConditionRuleIds:
    - KillAllGovforRule
    - KillAllXenoRule

- type: roundGroup
