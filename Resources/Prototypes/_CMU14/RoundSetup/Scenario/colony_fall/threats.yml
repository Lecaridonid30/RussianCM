- type: roundGroup
  id: ColonyFallCultistRoundGroup
  kind: Hostile
  sourcePrototypeId: cultistThreat
  spawn:
    bodyBuckets:
      - bucket: Leader
        count: 1
        bodies:
          CMXenoQueen: 1
      - bucket: Member
        count: 3
        bodies:
          cultistJob: 3
      - bucket: Entity
        count: 0
    markerRequirements:
      - bucket: Leader
        requiredBodyCount: 1
        requiredMarkerCount: 1
        requiredTags:
          - force:hostile
          - bucket:Leader
          - marker-id:<generic>
      - bucket: Member
        requiredBodyCount: 3
        requiredMarkerCount: 1
        requiredTags:
          - force:hostile
          - bucket:Member
          - marker-id:<generic>
    allowsUnderfill: true
  winConditionRuleIds:
    - KillAllColonistRule
    - KillAllXenoRule
  timing:
    delayMinSeconds: 1200
    delayMaxSeconds: 2400

