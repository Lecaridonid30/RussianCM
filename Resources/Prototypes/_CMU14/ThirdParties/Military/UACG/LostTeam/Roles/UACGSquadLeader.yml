  chevrons:
    RMCRankSergeant:
      entity: AU14ChevronUSArmySergeant
      requirements:
      - !type:RoleTimeRequirement
        role: AU14JobUACGSquadLeader
        time: 18000 #5 hours
    RMCRankCorporal:
      entity: AU14ChevronUSArmyCorporal
      requirements: []
  spawnMenuRoleName: UACG Squad Leader (3rd party)
  startingGear: AU14GearUACGLostSquadLeader
  greeting: au14-uacg-greeting
  icon: "CMJobIconEmpty"
  joinNotifyCrew: false
  supervisors: au14-job-supervisors-platco
  accessGroups:
  - AU14GovforFTL
  hidden: false

- type: entity
