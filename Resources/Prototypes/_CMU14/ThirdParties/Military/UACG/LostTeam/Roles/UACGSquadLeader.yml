  - type: GhostRoleApplySpecial
    squad: AU14SquadUACG
  - type: GhostRole
    makeSentient: true
    allowSpeech: true
    allowMovement: true
    name: au-14-job-name-uacg-squadleader
    description: au14-uacg-description
    reregister: false
    job: AU14UACGSquadleader
    raffle:
      settings: short
    rules: au14-uacg-rules

- type: startingGear
  id: AU14GearUACGLostSquadLeader
  equipment:
    id: AU14IDCardUACGSquadleader
    outerClothing: RMCOuterClothingExternalWebbingForeconSurvivorFill
    jumpsuit: AU14UACGFatigues
    shoes: CMBootsBrownFilled
    mask: RMCMaskScarfTanDown
    head: AU14UACGPatrolCap
    belt: AU14UACGBeltFilledM20a
    pocket1: AU14UACGCigPouch
    pocket2: AU14PouchIFAKFill
    back: AU14UACGPatrolRucksack
