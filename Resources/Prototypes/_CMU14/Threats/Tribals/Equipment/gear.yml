# Shaman — tribal medic. Drops the bow/quiver and rolls with a satchel
# stuffed with field medicine instead. Spear is in-hand so they can still
# defend themselves; the belt slot carries the splints/gauze/ointment
# survivor pouch every tribal medic role uses.
- type: startingGear
  id: AU14GearTribalShaman
  equipment:
    jumpsuit: ClothingUniformJumpsuitColorBrown
    shoes: RMCShoesSandals
    back: ClothingBackpackSatchelLeather
    belt: RMCPouchFirstAidSplintsGauzeOintment
  inhand:
  - TribalSpear
  storage:
    back:
    - CMGauze10
    - CMOintment10
    - CMGauze10
    - CMOintment10
    - CMHealthAnalyzer
    - CMFirstAidKitFilledRobust
    - Torch
    - Torch
    - Torch
    - Torch
    - RMCToolHatchet
