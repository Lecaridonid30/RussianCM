# --- Starting gear ------------------------------------------------------
# Inline per-variant — no abstract parent, matches the cultist/WYHT
# starting-gear pattern. Every tribal slots a brown jumpsuit (their
# rough leather wrap), sandals, leather satchel, and a quiver of 12
# tribal arrows; the weapon in-hand is the only per-variant difference.

- type: startingGear
  id: AU14GearTribalLeader
  equipment:
    jumpsuit: ClothingUniformJumpsuitColorBrown
    shoes: RMCShoesSandals
    back: ClothingBackpackSatchelLeather
    belt: ClothingBeltQuiver
  inhand:
  - TribalSpear
  storage:
    belt:
    - TribalArrow
    - TribalArrow
    - TribalArrow
    - TribalArrow
    - TribalArrow
    - TribalArrow
    - TribalArrow
    - TribalArrow
    - TribalArrow
    - TribalArrow
    - TribalArrow
    - TribalArrow
    back:
    - Torch
    - Torch
    - Torch
    - Torch
    - RMCToolHatchet

