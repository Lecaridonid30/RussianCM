# --- Job + role prototypes -----------------------------------------------
# Three tribal jobs, each parented directly to CMJobBase like the cultist
# and WYHT roles. No abstract intermediary — every field is inline so the
# standard GhostRoleApplySpecial pipe finds everything it needs.

- type: job
  parent: CMJobBase
  id: AU14JobTribalLeader
  roundSide: Threat
  roundForce: TRIBE
  roundRole: TribalLeader
  roundComponents:
  - type: Skills
    skills:
      RMCSkillCqc: 2
      RMCSkillFireman: 1
      RMCSkillEndurance: 1
  - type: JobPrefix
    prefix: au14-job-prefix-tribal-leader
  - type: Language
    spokenLanguages:
    - Arcturian
    understoodLanguages:
    - Arcturian
    currentLanguage: Arcturian
    defaultLanguage: Arcturian

  name: au14-job-name-tribal-leader
  description: au14-job-description-tribal-leader
  setPreference: false
  playTimeTracker: AU14JobTribal
  startingGear: AU14GearTribalLeader
  icon: "CMJobIconEmpty"
  requireAdminNotify: false
  joinNotifyCrew: false
  supervisors: au14-job-supervisors-tribal
  roleWeight: 0.25

