    - "Сохранять последний замысел, но расширить его до любых действий, которые локально выглядят полезными для операции."
    - "Приостановить все значимые решения до восстановления связи, даже если ситуация на месте требует управления."
    - "Передать инициативу старшему бойцу и ограничиться наблюдением, чтобы не превысить полномочия."
