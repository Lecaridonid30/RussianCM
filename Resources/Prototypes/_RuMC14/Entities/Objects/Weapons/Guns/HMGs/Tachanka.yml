- type: entity
  parent: [ CMBaseWeaponRifle, RMCBaseWeaponMagazineVisuals ]
  name: DP-72 "Tachanka"
  id: RuMCMachineGunTachanka
  description: Soviet-era 7.62x54R heavy machine gun. With a pan magazine and a heavy barrel. Reliable, but heavy.
  components:
  - type: Item
    size: Huge
#  - type: Appearance
#  - type: Corrodible
#    isCorrodible: false
  - type: Sprite
    sprite: _RuMC14/Objects/Weapons/Guns/LMGs/Tachanka/tachanka_inhands.rsi
    layers:
    - state: base
      sprite: _RuMC14/Objects/Weapons/Guns/LMGs/Tachanka/tachanka.rsi
    - state: bolt-open
      sprite: _RuMC14/Objects/Weapons/Guns/LMGs/Tachanka/tachanka.rsi
      map: [ "enum.GunVisualLayers.Base" ]
    - state: mag-0
      sprite: _RuMC14/Objects/Weapons/Guns/LMGs/Tachanka/tachanka.rsi
      map: [ "enum.GunVisualLayers.Mag" ]
  - type: Clothing
    sprite: _RuMC14/Objects/Weapons/Guns/LMGs/Tachanka/tachanka_inhands.rsi
  - type: ContainerContainer
    containers:
      gun_magazine: !type:ContainerSlot
      gun_chamber: !type:ContainerSlot
  - type: Gun
    selectedMode: FullAuto
    availableModes:
    - SemiAuto
    - FullAuto
    soundGunshot:
      path: /Audio/_RMC14/Weapons/Guns/Gunshots/gun_m60.ogg
      params:
        volume: -4
    soundEmpty:
      path: /Audio/Weapons/Guns/Empty/lmg_empty.ogg
  - type: RMCSelectiveFire
    baseFireModes:
    - SemiAuto
    - FullAuto
    recoilWielded: 0
    recoilUnwielded: 0
    scatterWielded: 1
    scatterUnwielded: 1
    baseFireRate: 4
    modifiers:
      FullAuto:
        fireDelay: 0.01
        maxScatterModifier: 3
        shotsToMaxScatter: 6
  - type: RMCWeaponAccuracy
    accuracyMultiplier: 0.8
    accuracyMultiplierUnwielded: 0.65
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: RuMCMagazineTachankaLarge
        insertSound: /Audio/_RMC14/Weapons/Guns/Reload/smg_reload.ogg
        ejectSound: /Audio/_RMC14/Weapons/Guns/Reload/smg_unload.ogg
        priority: 2
        whitelist:
          tags:
          - RuMCMagazineTachanka
          - RuMCMagazineTachankaLarge
          - RuMCMagazineTachankaLargeTracer
  - type: GunDamageModifier
    multiplier: 1
  - type: AttachableHolder
    slots:
      rmc-aslot-rail:
        whitelist:
          tags:
          - RMCAttachmentRailFlashlight
          - RMCAttachmentMagneticHarness
          - RMCAttachmentS5RedDotSight
          - RMCAttachmentS6ReflexSight
      rmc-aslot-underbarrel:
        startingAttachable: RMCAttachmentBipod
        whitelist:
          tags:
          - RMCAttachmentBipod
  - type: AttachableHolderVisuals
    offsets:
      rmc-aslot-rail: 0, 0.1
      rmc-aslot-underbarrel: 0.35, -0.3
  - type: ItemCamouflage
    camouflageVariations: { }
  - type: Tag
    tags:
    - RuMCMachineGunTachanka
  - type: Wieldable
  - type: GunRequiresWield
  - type: RMCMagneticItem

# Magazines

- type: entity
  parent: CMMagazineRifleBase
  id: RuMCMagazineTachanka
  name: DP-72 pan magazine (7.62x54R)
  description: A 47-round pan magazine for the DP-72 light machine gun.
  components:
  - type: Tag
    tags:
    - RuMCMagazineTachanka
  - type: BallisticAmmoProvider
    whitelist:
      tags:
      - RMCCartridgeLMGQYJ72
    proto: RMCCartridgeLMGQYJ72
    capacity: 47
    deleteWhenEmpty: false
  - type: Sprite
    sprite: _RuMC14/Objects/Weapons/Guns/Ammunition/Magazines/LMGs/tachanka.rsi
    layers:
    - state: base_mini
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-3Mini
      map: ["enum.GunVisualLayers.Mag"]
  - type: Clothing
    slots:
    - suitStorage
  - type: Item
    size: Large

- type: entity
  parent: RuMCMagazineTachanka
  id: RuMCMagazineTachankaLarge
  name: DP-72 extended pan magazine (7.62x54R)
  description: An experimental 75-round pan magazine for the DP-72. Heavy, but holds more firepower.
  components:
  - type: Tag
    tags:
    - RuMCMagazineTachankaLarge
  - type: BallisticAmmoProvider
    whitelist:
      tags:
      - RMCCartridgeLMGQYJ72
    proto: RMCCartridgeLMGQYJ72
    capacity: 75
    deleteWhenEmpty: false
  - type: Sprite
    sprite: _RuMC14/Objects/Weapons/Guns/Ammunition/Magazines/LMGs/tachanka.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]

- type: entity
  parent: RuMCMagazineTachanka
  id: RuMCMagazineTachankaLargeTracer
  name: DP-72 extended pan magazine (7.62x54R Tracer)
  description: An experimental 75-round pan magazine for the DP-72. Heavy, but holds more firepower.
  components:
  - type: Tag
    tags:
    - RuMCMagazineTachankaLargeTracer
  - type: BallisticAmmoProvider
    whitelist:
      tags:
      - RuMCCartridge762x54RTracer
      - RMCCartridgeLMGQYJ72
    proto: RuMCCartridge762x54RTracer
    capacity: 75
    deleteWhenEmpty: false
  - type: Sprite
    sprite: _RuMC14/Objects/Weapons/Guns/Ammunition/Magazines/LMGs/tachanka.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-2Tracer
      map: ["enum.GunVisualLayers.Mag"]

# Cartridges

- type: entity
  parent: RMCCartridgeLMGQYJ72
  id: RuMCCartridge762x54RTracer
  name: 7.62x54R Tracer
  components:
  - type: CartridgeAmmo
    proto: RuMCBullet762x54RTracer
  - type: Tag
    tags:
    - RuMCCartridge762x54RTracer

